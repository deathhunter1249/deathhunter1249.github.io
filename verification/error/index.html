<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Failed — DPRT</title>
  <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0a08;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(139, 0, 0, 0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(100, 0, 0, 0.2) 0%, transparent 60%);
      font-family: 'Finger Paint', cursive;
      color: #c8a96e;
      overflow: hidden;
    }

    .ink-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8a96e' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .container {
      position: relative;
      text-align: center;
      padding: 60px 48px;
      max-width: 480px;
      width: 90%;
    }

    .border-frame {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(180, 40, 40, 0.25);
      pointer-events: none;
    }

    .border-frame::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(180, 40, 40, 0.1);
    }

    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: rgba(180, 40, 40, 0.6);
      border-style: solid;
    }

    .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .seal {
      font-family: 'Finger Paint', cursive;
      font-size: 38px;
      color: #8b1a1a;
      display: inline-block;
      border: 2px solid #8b1a1a;
      width: 64px;
      height: 64px;
      line-height: 60px;
      margin-bottom: 32px;
      opacity: 0.85;
    }

    h1 {
      font-size: 28px;
      letter-spacing: 4px;
      color: #c84040;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(200, 64, 64, 0.45);
      letter-spacing: 6px;
      margin-bottom: 36px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto 32px;
      max-width: 280px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(180, 40, 40, 0.35), transparent);
    }

    .divider-dot {
      width: 4px;
      height: 4px;
      background: rgba(180, 40, 40, 0.45);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    p {
      font-size: 14px;
      line-height: 2;
      color: rgba(200, 169, 110, 0.55);
      margin-bottom: 40px;
    }

    .footer {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(200, 169, 110, 0.2);
      text-transform: uppercase;
    }

    .ink-splash { position: fixed; border-radius: 50%; pointer-events: none; }
    .ink-splash.s1 { width: 600px; height: 600px; top: -200px; left: -200px; background: radial-gradient(circle, rgba(139,0,0,0.08) 0%, transparent 70%); }
    .ink-splash.s2 { width: 400px; height: 400px; bottom: -150px; right: -100px; background: radial-gradient(circle, rgba(139,0,0,0.06) 0%, transparent 70%); }
  </style>
</head>
<body>
  <div class="ink-bg"></div>
  <div class="ink-splash s1"></div>
  <div class="ink-splash s2"></div>

  <div class="container">
    <div class="border-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>

    <div class="seal">✕</div>
    <h1>Failed</h1>
    <div class="subtitle">验证失败</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <p>Verification could not be completed.<br>Please check your group membership and try again.</p>
    <div class="footer">You may close this tab</div>
  </div>
</body>
</html>
