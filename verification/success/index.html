<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verified — DPRT</title>
  <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #e8e8e8;
      --accent: #BD4F4F;
      --border: 3px solid #000;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle, transparent 30%, rgba(0,0,0,0.05) 100%),
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 100% 100%, 50px 50px, 50px 50px;
      font-family: 'Finger Paint', cursive;
      color: #000;
      overflow: hidden;
    }

    .container {
      position: relative;
      text-align: center;
      padding: 60px 48px;
      max-width: 480px;
      width: 90%;
    }

    .border-frame {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0,0,0,0.15);
      pointer-events: none;
    }

    .border-frame::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(0,0,0,0.07);
    }

    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: #000;
      border-style: solid;
    }

    .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .seal {
      font-family: 'Finger Paint', cursive;
      font-size: 42px;
      color: var(--accent);
      display: inline-block;
      border: 2px solid #000;
      width: 64px;
      height: 64px;
      line-height: 60px;
      margin-bottom: 32px;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 28px;
      letter-spacing: 4px;
      color: var(--accent);
      margin-bottom: 8px;
      text-transform: uppercase;
      -webkit-text-stroke: 1px #000;
    }

    .subtitle {
      font-family: 'Finger Paint', cursive;
      font-size: 13px;
      color: rgba(0,0,0,0.3);
      letter-spacing: 6px;
      margin-bottom: 36px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto 32px;
      max-width: 280px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,0,0,0.2), transparent);
    }

    .divider-dot {
      width: 4px;
      height: 4px;
      background: #000;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    p {
      font-family: 'Finger Paint', cursive;
      font-size: 14px;
      line-height: 2;
      color: rgba(0,0,0,0.5);
      margin-bottom: 40px;
    }

    .footer {
      font-family: 'Finger Paint', cursive;
      Font-size: 11px;
      letter-spacing: 3px;
      color: rgba(0,0,0,0.2);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="border-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>

    <div class="seal">茶</div>
    <h1>Verified</h1>
    <div class="subtitle">人民共和国</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <p>You have been verified with the<br>Democratic People's Republic of Teapots.</p>
    <div class="footer">You may close this tab</div>
  </div>
</body>
</html>
