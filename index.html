<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DPRT // HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet" />
    <style>
        :root {
            /* Not pure white (#fff), but a soft 'Roblox Studio' gray to prevent blinding */
            --off-white: #e8e8e8;
            --jjs-red: #BD4F4F;
            --stroke: 3px solid #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-color: var(--off-white);
            /* The Vignette: Darker edges keep the focus in the center and reduce eye strain */
            background-image: 
                radial-gradient(circle, transparent 30%, rgba(0,0,0,0.05) 100%),
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            font-family: 'Finger Paint', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .jjs-entry-frame {
            position: relative;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        /* HEADER: Clean white center with the signature JJS 3px black outline */
        h1 {
            font-size: 120px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -6px;
            line-height: 0.8;
            -webkit-text-stroke: 3px #000;
            /* Hard-edge shadow makes the text 'pop' off the light background */
            filter: drop-shadow(8px 8px 0px rgba(0,0,0,0.15));
            margin-bottom: 30px;
        }

        /* Tactical Divider - Sukuna Red */
        .divider {
            width: 100px;
            height: 6px;
            background: var(--jjs-red);
            margin: 0 auto 40px;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .jjs-btn {
            width: 280px;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 15px 0;
            font-size: 20px;
            text-transform: uppercase;
            border: var(--stroke);
            /* Softened shadow for light mode */
            box-shadow: 6px 6px 0px rgba(0,0,0,0.1);
            transition: 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* JJS Hover Logic: Snap Scale + Color Shift */
        .jjs-btn:hover {
            background: var(--jjs-red);
            color: #fff;
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0px #000;
        }

        .jjs-btn:active {
            transform: translate(0, 0);
            box-shadow: 2px 2px 0px #000;
        }

        .footer-info {
            margin-top: 60px;
            font-size: 12px;
            color: rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="jjs-entry-frame">
        <h1>DPRT</h1>
        <div class="divider"></div>

        <div class="btn-stack">
            <a href="https://discord.gg/q3vQyeMqBH" class="jjs-btn">Discord Server</a>
            <a href="https://www.roblox.com/communities/34683201"class="jjs-btn" style="font-size: 14px; width: 220px; opacity: 0.7;">Roblox Group</a>
        </div>

        <div class="footer-info">
            SECURED_ACCESS // V.4.13
        </div>
    </div>

</body>
</html>
