<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DPRT // JJS STYLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            background-color: #0c0c0c;
            /* Subtle dark grid pattern often found in Roblox UIs */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Finger Paint', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Main Menu Frame */
        .menu-frame {
            width: 700px;
            background: rgba(15, 15, 15, 0.85);
            border: 3px solid #000; /* Thick JJS Outline */
            border-radius: 12px;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1); /* Inner thin white line */
            padding: 30px;
            position: relative;
        }

        /* Red "Active" Accent Bar */
        .header-accent {
            position: absolute;
            top: 15px;
            left: -8px;
            height: 40px;
            width: 6px;
            background: #8b1a1a;
            border: 2px solid #000;
        }

        h1 { 
            color: #fff;
            font-size: 38px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            -webkit-text-stroke: 1.5px #000; /* Shadow/Outline effect */
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .divider {
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            border-radius: 2px;
        }

        .content-area {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #000;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        p {
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
        }

        /* JJS Style Buttons: Outlined, Rounded, and responsive */
        .btn-list { display: flex; flex-direction: column; gap: 10px; }

        .btn {
            background: rgba(40, 40, 40, 0.6);
            color: #fff;
            text-decoration: none;
            padding: 12px 20px;
            border: 2px solid #000;
            border-radius: 6px;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.15s ease-in-out;
        }

        .btn::after {
            content: ">";
            font-weight: bold;
            opacity: 0.5;
        }

        .btn:hover {
            background: #8b1a1a;
            border-color: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(139, 26, 26, 0.3);
        }

        .btn:active { transform: scale(0.98); }

        /* The little 'Status' tags found in JJS menus */
        .status-badge {
            font-size: 10px;
            background: #8b1a1a;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            border: 1px solid #000;
        }
    </style>
</head>
<body>

    <div class="menu-frame">
        <div class="header-accent"></div>
        <h1>
            DPRT 
            <span class="status-badge">Main Terminal</span>
        </h1>
        
        <div class="divider"></div>

        <div class="content-area">
            <p>
                The Democratic People's Republic of Teapots is an open-world sandbox military simulation. 
                We focus on high-stakes roleplay mixed with community chaotic energy. 
            </p>
        </div>

        <div class="btn-list">
            <a href="#" class="btn">DEPLOY TO DISCORD</a>
            <a href="#" class="btn">ACCESS ROBLOX GROUP</a>
            <a href="#" class="btn">MINISTRY GUIDELINES</a>
        </div>
    </div>

</body>
</html>
