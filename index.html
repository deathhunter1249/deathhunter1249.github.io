<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRT | Kettle Brigade</title>
    <style>
        /* INK STYLE - Minimal & Sharp */
        :root {
            --ink-black: #111111;
            --off-white: #fcfaf7; /* Deep, off-white (like quality paper) */
            --ink-border: 1px solid #d4d4d4;
            --accent: #ff4d4d; /* Minimal accent color (like a red wax seal or stamp) */
        }

        body {
            background-color: var(--off-white);
            background-image: url('data:image/svg+xml,%3Csvg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill-rule="evenodd"%3E%3Cg fill="%23dcd9d6" fill-opacity="0.2"%3E%3Cpath d="M0 40h40V0H0v40zM20 20h20v20H20V20zM0 0h20v20H0V0z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E'); /* Subtle, ink-on-paper texture */
            color: var(--ink-black);
            font-family: 'Georgia', 'Times New Roman', Times, serif; /* Ink/Print font */
            margin: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 80px 20px;
            border-bottom: var(--ink-border);
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 0.1rem;
            border-bottom: 2px solid var(--accent); /* Minimal under-line */
            display: inline-block;
            padding-bottom: 5px;
        }

        header p {
            font-style: italic;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        .section {
            margin-bottom: 60px;
            border-left: 2px solid var(--ink-black);
            padding-left: 25px;
        }

        .section h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            margin-top: 0;
        }

        .section p {
            margin-bottom: 25px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .ink-btn {
            display: inline-block;
            padding: 12px 28px;
            background: none;
            color: var(--ink-black);
            border: var(--ink-border);
            text-decoration: none;
            font-weight: bold;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Clean sans-serif for buttons */
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }

        .ink-btn:hover {
            background-color: var(--ink-black);
            color: var(--off-white);
            border-color: var(--ink-black);
            transform: translateY(-2px);
        }

        .member-feature {
            background-color: #ffffff; /* pure white for contrast */
            padding: 30px;
            border: var(--ink-border);
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
        }

        .member-feature img {
            max-width: 150px;
            height: auto;
            border-radius: 50%;
            border: var(--ink-border);
            margin-bottom: 20px;
            filter: grayscale(100%); /* Grayscale feature for ink vibe */
        }

        .member-feature h3 {
            margin: 0;
            font-size: 1.5rem;
        }

        footer {
            text-align: center;
            padding: 40px;
            border-top: var(--ink-border);
            font-size: 0.9rem;
            font-style: italic;
        }

    </style>
</head>

    <header>
